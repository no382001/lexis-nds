name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  iliad:
    name: Iliad
    runs-on: ubuntu-latest
    container: skylyrac/blocksds:slim-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        run: curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Cache data repos
        uses: actions/cache@v4
        with:
          path: data/
          key: data-iliad-${{ hashFiles('corpora.yml') }}
          restore-keys: data-iliad-

      - name: Cache fonts
        id: cache-fonts
        uses: actions/cache@v4
        with:
          path: romfs/font_*.bin
          key: fonts-${{ hashFiles('scripts/build_font.py', 'scripts/get_fonts.py') }}

      - run: pip install -r requirements.txt

      - run: just iliad-db
      - run: just iliad-flatdb
      - if: steps.cache-fonts.outputs.cache-hit != 'true'
        run: just fonts
      - run: make

      - uses: actions/upload-artifact@v4
        with:
          name: lexis-iliad
          path: lexis-iliad.nds

  anabasis:
    name: Anabasis
    runs-on: ubuntu-latest
    container: skylyrac/blocksds:slim-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        run: curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Cache data repos
        uses: actions/cache@v4
        with:
          path: data/
          key: data-anabasis-${{ hashFiles('corpora.yml') }}
          restore-keys: data-anabasis-

      - name: Cache fonts
        id: cache-fonts
        uses: actions/cache@v4
        with:
          path: romfs/font_*.bin
          key: fonts-${{ hashFiles('scripts/build_font.py', 'scripts/get_fonts.py') }}

      - run: pip install -r requirements.txt

      - run: just anabasis-db
      - run: just anabasis-flatdb
      - if: steps.cache-fonts.outputs.cache-hit != 'true'
        run: just fonts
      - run: make

      - uses: actions/upload-artifact@v4
        with:
          name: lexis-anabasis
          path: lexis-anabasis.nds
